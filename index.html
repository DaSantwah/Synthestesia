<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synthestesia — Audio Reactive Visuals</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Hydra renders onto this canvas (full screen) -->
  <canvas id="hydra-canvas"></canvas>

  <!-- Mini spectrum bar drawn here, floats above visuals -->
  <canvas id="spectrum-canvas" width="480" height="56"></canvas>

  <!-- ── UPLOAD SCREEN ────────────────────────────────────── -->
  <div id="upload-screen">
    <div class="hero">
      <div class="wordmark">SYNTH<span>ESTESIA</span></div>
      <p class="tagline">Audio Reactive Visual Generator</p>
    </div>

    <div class="drop-zone" id="drop-zone">
      <div class="drop-icon">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 28V12M20 12L13 19M20 12L27 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
          <path d="M8 30H32" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
        </svg>
      </div>
      <p class="drop-main">Arrastra tu archivo de audio aquí</p>
      <p class="drop-hint">MP3 · WAV · FLAC · OGG · M4A</p>
      <span class="drop-or">— o haz clic para explorar —</span>
      <input type="file" id="file-input" accept="audio/*" />
    </div>

    <p class="footer-note">
      Todo el procesamiento ocurre en tu navegador · Ningún archivo se sube a servidores
    </p>
  </div>

  <!-- ── CONTROL BAR ──────────────────────────────────────── -->
  <div id="control-bar" class="hidden">

    <div class="cb-left">
      <div class="track-meta">
        <span id="track-name">Sin título</span>
        <span id="track-time">0:00 / 0:00</span>
      </div>
    </div>

    <div class="cb-center">
      <button id="btn-play" class="icon-btn" title="Play / Reproducir">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M6 4l12 6-12 6V4z"/></svg>
      </button>
      <button id="btn-stop" class="icon-btn" title="Stop">
        <svg viewBox="0 0 20 20" fill="currentColor"><rect x="4" y="4" width="12" height="12"/></svg>
      </button>
    </div>

    <div class="cb-right">
      <div class="preset-group">
        <span class="group-label">PRESET</span>
        <div class="preset-row">
          <button class="preset-btn active" data-preset="0">01</button>
          <button class="preset-btn" data-preset="1">02</button>
          <button class="preset-btn" data-preset="2">03</button>
          <button class="preset-btn" data-preset="3">04</button>
          <button class="preset-btn" data-preset="4">05</button>
        </div>
      </div>

      <div class="divider"></div>

      <button id="btn-record" class="rec-btn">
        <span class="rec-dot-icon"></span>
        <span id="rec-label">REC</span>
      </button>

     <a id="btn-download" class="dl-btn hidden" download="synthestesia.webm">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="square">
          <path d="M8 2v8M5 7l3 3 3-3M2 13h12"/>
        </svg>
        DESCARGAR
      </a>

      <button id="btn-reset" class="reset-btn" title="Cargar nuevo archivo">✕</button>
    </div>
  </div>

  <!-- Recording indicator (top-right corner) -->
  <div id="rec-indicator" class="hidden">
    <span class="pulse-dot"></span>REC
  </div>

  <!-- Hydra library (global, not a module) -->
  <script src="https://unpkg.com/hydra-synth"></script>
  <!-- App entry point (ES module) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
